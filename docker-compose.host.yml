# Compose for VPSes where host nginx is already the front door for many
# Docker apps (e.g. Hostinger boxes hosting multiple sites). Containers bind
# to 127.0.0.1:3100/3101 only — host nginx proxies in (see infra/nginx/).
#
# Use this *instead of* docker-compose.yml on those VPSes:
#   docker compose -f docker-compose.host.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args: { APP: web }
    image: synergy-web:latest
    container_name: synergy-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SYNERGY_STORE_DIR: /data
    volumes:
      - synergy-data:/data
    ports:
      - '127.0.0.1:3100:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/en']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args: { APP: admin }
    image: synergy-admin:latest
    container_name: synergy-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SYNERGY_STORE_DIR: /data
    volumes:
      - synergy-data:/data
    ports:
      - '127.0.0.1:3101:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  synergy-data: # JSON store survives rebuilds
