# Synergy Typing — site stack.
# Designed to live on a multi-site VPS behind a shared Traefik reverse proxy.
# The proxy lives in `infra/proxy/` and runs once per VPS; this stack only
# attaches to its `web` network and declares Traefik labels.
#
# To deploy this site standalone (no other sites on the box) the proxy stack
# in infra/proxy/ must also be running. See DEPLOY.md.
#
# Required env (in .env at this directory on the VPS, see .env.example):
#   DOMAIN_WEB    e.g. milestonm.ae
#   DOMAIN_ADMIN  e.g. admin.milestonm.ae

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args: { APP: web }
    image: synergy-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SYNERGY_STORE_DIR: /data
    volumes:
      - synergy-data:/data
    networks: [web, internal]
    expose: ['3000']
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.synergy-web.rule=Host(`${DOMAIN_WEB}`) || Host(`www.${DOMAIN_WEB}`)
      - traefik.http.routers.synergy-web.entrypoints=websecure
      - traefik.http.routers.synergy-web.tls=true
      - traefik.http.routers.synergy-web.tls.certresolver=le
      - traefik.http.services.synergy-web.loadbalancer.server.port=3000
      # Redirect www → bare domain.
      - traefik.http.middlewares.synergy-web-www.redirectregex.regex=^https://www\.(.*)
      - traefik.http.middlewares.synergy-web-www.redirectregex.replacement=https://$$1
      - traefik.http.middlewares.synergy-web-www.redirectregex.permanent=true
      - traefik.http.routers.synergy-web.middlewares=synergy-web-www
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/en']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args: { APP: admin }
    image: synergy-admin:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SYNERGY_STORE_DIR: /data
    volumes:
      - synergy-data:/data
    networks: [web, internal]
    expose: ['3000']
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.synergy-admin.rule=Host(`${DOMAIN_ADMIN}`)
      - traefik.http.routers.synergy-admin.entrypoints=websecure
      - traefik.http.routers.synergy-admin.tls=true
      - traefik.http.routers.synergy-admin.tls.certresolver=le
      - traefik.http.services.synergy-admin.loadbalancer.server.port=3000
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  web: # shared with Traefik — created by infra/proxy bootstrap
    external: true
  internal: # private to this site
    driver: bridge

volumes:
  synergy-data: # JSON store survives rebuilds
