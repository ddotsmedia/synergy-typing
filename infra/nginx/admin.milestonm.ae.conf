# Nginx vhost for admin.milestonm.ae — proxies to the synergy-admin container
# on 127.0.0.1:3101. Drop into /etc/nginx/sites-available/admin.milestonm.ae,
# symlink from sites-enabled/, then run:
#   certbot --nginx -d admin.milestonm.ae

server {
    listen 80;
    listen [::]:80;
    server_name admin.milestonm.ae;

    client_max_body_size 25M;

    # Block search engines on the admin host.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location / {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
