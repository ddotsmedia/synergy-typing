name: Deploy

# Triggered by:
#   • push to main
#   • manual workflow_dispatch (Actions tab → Deploy → Run workflow)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never interrupt a deploy in flight

jobs:
  deploy:
    name: SSH → VPS → docker compose up
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Sanity-check secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || { echo "::error ::Missing VPS_HOST secret"; exit 1; }
          test -n "${{ secrets.VPS_USER }}" || { echo "::error ::Missing VPS_USER secret"; exit 1; }
          test -n "${{ secrets.VPS_SSH_KEY }}" || { echo "::error ::Missing VPS_SSH_KEY secret"; exit 1; }

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/synergy' }}
          DEPLOY_SCRIPT: ${{ vars.DEPLOY_SCRIPT || 'scripts/deploy-host.sh' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "$VPS_USER@$VPS_HOST" \
            "bash $APP_DIR/$DEPLOY_SCRIPT"

      - name: Smoke check
        if: success()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/synergy' }}
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'docker-compose.host.yml' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "$VPS_USER@$VPS_HOST" \
            "docker compose -f $APP_DIR/$COMPOSE_FILE ps"
