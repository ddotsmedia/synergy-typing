# Production stack for VPS deployment.
# Customer site at https://${DOMAIN_WEB}, admin at https://${DOMAIN_ADMIN}.
# Caddy auto-issues + renews TLS certificates from Let's Encrypt.
#
# Required env (set in .env on the VPS, see .env.example):
#   DOMAIN_WEB    e.g. synergytyping.com
#   DOMAIN_ADMIN  e.g. admin.synergytyping.com
#   LETSENCRYPT_EMAIL  for cert issuance notifications

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args: { APP: web }
    image: synergy-web:latest
    restart: unless-stopped
    expose: ['3000']
    environment:
      NODE_ENV: production
      SYNERGY_STORE_DIR: /data
    volumes:
      - synergy-data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/en']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args: { APP: admin }
    image: synergy-admin:latest
    restart: unless-stopped
    expose: ['3000'] # internal port, Caddy maps from external 443
    environment:
      NODE_ENV: production
      SYNERGY_STORE_DIR: /data
    volumes:
      - synergy-data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN_WEB: ${DOMAIN_WEB}
      DOMAIN_ADMIN: ${DOMAIN_ADMIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - admin

volumes:
  synergy-data: # JSON store — persists across restarts and rebuilds
  caddy-data: # certificates + ACME state
  caddy-config: # caddy auto-generated config
