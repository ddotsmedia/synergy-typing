# Nginx vhost for milestonm.ae — proxies to the synergy-web container on
# 127.0.0.1:3100. Drop into /etc/nginx/sites-available/milestonm.ae and
# symlink from sites-enabled/. Then run:
#   certbot --nginx -d milestonm.ae -d www.milestonm.ae
# to attach Let's Encrypt SSL (certbot edits this file in place).

server {
    listen 80;
    listen [::]:80;
    server_name milestonm.ae;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Long-cache Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# Redirect www → bare
server {
    listen 80;
    listen [::]:80;
    server_name www.milestonm.ae;
    return 301 http://milestonm.ae$request_uri;
}
